apiVersion: v1
kind: ServiceAccount
metadata:
  name: aws-load-balancer-controller
  namespace: kube-system
  annotations:
    # Apply via envsubst — do not apply this file directly:
    # export LBC_ROLE_ARN=$(terraform -chdir=infra/terraform/environments/dev output -raw lbc_role_arn)
    # envsubst < service-account.yaml | kubectl apply -f -
    eks.amazonaws.com/role-arn: ${LBC_ROLE_ARN}
