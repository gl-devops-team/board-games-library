apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-config
  namespace: monitoring
data:
  grafana.ini: |
    [server]
    root_url = %(protocol)s://%(domain)s/grafana
    serve_from_sub_path = true

    [auth.anonymous]
    enabled = false

    [log]
    mode = console
    level = info

  datasource.yaml: |
    apiVersion: 1
    datasources:
      - name: CloudWatch
        type: cloudwatch
        access: proxy
        isDefault: true
        jsonData:
          authType: default
          defaultRegion: eu-central-1
