apiVersion: apps/v1
kind: Deployment
metadata:
  name: db
  namespace: boardgames
  annotations:
    checkov.io/skip1: "CKV_K8S_43=Image digest pinning impractical in development"
    checkov.io/skip2: "CKV_K8S_40=Postgres image requires UID 999, high UID would break data directory permissions"
    checkov.io/skip3: "CKV_K8S_35=Postgres initialization requires env vars, file-based secrets not supported"
    checkov.io/skip4: "CKV_K8S_23=Postgres entrypoint starts as root to set ownership then drops to UID 999"
    checkov.io/skip5: "CKV_K8S_37=Postgres initialization requires CHOWN and FOWNER capabilities, drop ALL breaks data dir setup"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: db
  template:
    metadata:
      labels:
        app: db
    spec:
      automountServiceAccountToken: false
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: db
          image: postgres:15
          imagePullPolicy: Always
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: POSTGRES_DB
          ports:
            - containerPort: 5432
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - NET_RAW
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - postgres
            initialDelaySeconds: 30
            periodSeconds: 20
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - postgres
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts:
            - name: db-storage
              mountPath: /var/lib/postgresql/data
            - name: tmp
              mountPath: /tmp
            - name: run-postgresql
              mountPath: /var/run/postgresql
      volumes:
        - name: db-storage
          emptyDir: {}
        - name: tmp
          emptyDir: {}
        - name: run-postgresql
          emptyDir: {}