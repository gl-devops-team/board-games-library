name: Infra Security Checks (Checkov)

on:
  pull_request:
    types: [ opened, edited, reopened, synchronize ]
    paths:
      - 'infra/terraform/**'
      - 'infra/docker/**'
      - 'infrastructure/k8s/**'
  push:
    branches: [ main, develop ]
    paths:
      - 'infra/terraform/**'
      - 'infra/docker/**'
      - 'infrastructure/k8s/**'
  workflow_dispatch:

jobs:
  checkov:
    name: Checkov Infra Scan
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Install Checkov
      run: pip install checkov

    # 🔹 Terraform (full coverage)
    - name: Run Checkov on Terraform
      run: |
        checkov -d infra/terraform \
          --framework terraform \
          --compact

    # 🔹 Dockerfiles (build security)
    - name: Run Checkov on Dockerfiles
      run: |
        checkov -d infra/docker \
          --framework dockerfile \
          --compact

    # 🔹 docker-compose (runtime config)
    - name: Run Checkov on docker-compose
      run: |
        checkov -f infra/docker/docker-compose.yml \
          --framework docker_compose \
          --compact

    # 🔹 Kubernetes manifests (NEW)
    - name: Run Checkov on Kubernetes
      run: |
        checkov -d infrastructure/k8s \
          --framework kubernetes \
          --compact