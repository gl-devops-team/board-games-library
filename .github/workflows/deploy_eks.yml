name: Deploy to EKS

on:
  workflow_run:
    workflows:
      - "Build and Push to ECR"
    types:
      - completed
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag (commit SHA) to deploy (leave empty for latest commit on main)"
        required: false
        default: ""
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    env:
      IMAGE_TAG: ${{ github.event.inputs.image_tag || github.event.workflow_run.head_sha }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v6
      with:
        role-to-assume: ${{ vars.AWS_PLATFORM_ROLE_ARN }}
        aws-region: eu-central-1

    - name: Configure kubectl
      run: |
        aws eks update-kubeconfig \
          --region eu-central-1 \
          --name boardgames-dev-eks

    - name: Update image tags in manifests
      run: |
        sed -i "s|image: .*boardgames-dev/backend.*|image: ${{ vars.ECR_REGISTRY }}/boardgames-dev/backend:${{ env.IMAGE_TAG }}|" \
          infra/k8s/backend-deployment.yaml
        sed -i "s|image: .*boardgames-dev/frontend.*|image: ${{ vars.ECR_REGISTRY }}/boardgames-dev/frontend:${{ env.IMAGE_TAG }}|" \
          infra/k8s/frontend-deployment.yaml

    - name: Apply manifests
      run: kubectl apply -f infra/k8s/

    - name: Verify rollout
      run: |
        kubectl rollout status deployment/backend -n boardgames --timeout=120s
        kubectl rollout status deployment/frontend -n boardgames --timeout=120s
        kubectl rollout status deployment/db -n boardgames --timeout=120s

    - name: Print application URL
      run: |
        echo "Waiting for ingress address..."
        for i in $(seq 1 12); do
          ADDRESS=$(kubectl get ingress boardgames -n boardgames -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null)
          if [ -n "$ADDRESS" ]; then
            echo "Application URL: http://$ADDRESS"
            exit 0
          fi
          sleep 10
        done
        echo "Ingress address not yet available — check 'kubectl get ingress boardgames -n boardgames'"
