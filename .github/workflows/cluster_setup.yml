name: Cluster Setup

on:
  workflow_dispatch:
  workflow_call:

permissions:
  id-token: write
  contents: read

jobs:
  cluster-setup:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v6
      with:
        role-to-assume: ${{ vars.AWS_PLATFORM_ROLE_ARN }}
        aws-region: eu-central-1

    - name: Configure kubectl for EKS
      run: |
        aws eks update-kubeconfig \
          --region eu-central-1 \
          --name boardgames-dev-eks

    - name: Install Helm
      uses: azure/setup-helm@v4

    - name: Install AWS Load Balancer Controller
      run: |
        helm repo add eks https://aws.github.io/eks-charts
        helm repo update
        helm upgrade --install aws-load-balancer-controller eks/aws-load-balancer-controller \
          --namespace kube-system \
          --set clusterName=boardgames-dev-eks \
          --set serviceAccount.create=false \
          --set serviceAccount.name=aws-load-balancer-controller \
          --wait

    - name: Install External Secrets Operator
      run: |
        helm repo add external-secrets https://charts.external-secrets.io
        helm repo update
        helm upgrade --install external-secrets external-secrets/external-secrets \
          --namespace external-secrets \
          --create-namespace \
          --set installCRDs=true \
          --wait

    - name: Apply LBC ServiceAccount
      run: |
        export LBC_ROLE_ARN=$(terraform -chdir=infra/terraform/environments/dev output -raw lbc_role_arn)
        envsubst < infra/k8s/lbc/service-account.yaml | kubectl apply -f -

    - name: Apply ESO manifests
      run: |
        export IRSA_ROLE_ARN=$(terraform -chdir=infra/terraform/environments/dev output -raw irsa_role_arn)
        envsubst < infra/k8s/eso/service-account.yaml | kubectl apply -f -
        kubectl apply -f infra/k8s/eso/secret-store.yaml
        kubectl apply -f infra/k8s/eso/external-secrets.yaml

    - name: Apply Ingress
      run: kubectl apply -f infra/k8s/ingress.yaml

    - name: Verify
      run: |
        kubectl wait --for=condition=ready pod \
          -l app.kubernetes.io/name=aws-load-balancer-controller \
          -n kube-system \
          --timeout=120s
        kubectl get ingress -n boardgames
