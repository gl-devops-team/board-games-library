name: Cluster Setup

on:
  workflow_dispatch:
  workflow_call:

permissions:
  id-token: write
  contents: read

jobs:
  cluster-setup:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v4
      with:
        terraform_version: 1.14.6

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v6
      with:
        role-to-assume: ${{ vars.AWS_PLATFORM_ROLE_ARN }}
        aws-region: eu-central-1

    - name: Terraform Init
      run: terraform init
      working-directory: infra/terraform/environments/dev

    - name: Configure kubectl for EKS
      run: |
        aws eks update-kubeconfig \
          --region eu-central-1 \
          --name boardgames-dev-eks

    - name: Install Helm
      uses: azure/setup-helm@v4

    - name: Create boardgames namespace
      run: kubectl create namespace boardgames --dry-run=client -o yaml | kubectl apply -f -

    - name: Apply LBC ServiceAccount
      run: |
        export LBC_ROLE_ARN=$(terraform -chdir=infra/terraform/environments/dev output -raw lbc_role_arn)
        envsubst < infra/k8s/lbc/service-account.yaml | kubectl apply -f -

    - name: Install AWS Load Balancer Controller
      run: |
        VPC_ID=$(terraform -chdir=infra/terraform/environments/dev output -raw vpc_id)
        helm repo add eks https://aws.github.io/eks-charts
        helm repo update
        helm upgrade --install aws-load-balancer-controller eks/aws-load-balancer-controller \
          --namespace kube-system \
          --set clusterName=boardgames-dev-eks \
          --set serviceAccount.create=false \
          --set serviceAccount.name=aws-load-balancer-controller \
          --set vpcId=${VPC_ID} \
          --wait \
          --timeout 3m

    - name: Install External Secrets Operator
      run: |
        helm repo add external-secrets https://charts.external-secrets.io
        helm repo update
        helm upgrade --install external-secrets external-secrets/external-secrets \
          --namespace external-secrets \
          --create-namespace \
          --set installCRDs=true \
          --wait

    - name: Wait for ESO CRDs
      run: |
        kubectl wait --for=condition=established \
          crd/secretstores.external-secrets.io \
          crd/externalsecrets.external-secrets.io \
          --timeout=60s
        sleep 15

    - name: Restart ESO to pick up fresh credentials
      run: kubectl rollout restart deployment/external-secrets -n external-secrets

    - name: Apply ESO manifests
      run: |
        export IRSA_ROLE_ARN=$(terraform -chdir=infra/terraform/environments/dev output -raw irsa_role_arn)
        envsubst < infra/k8s/eso/service-account.yaml | kubectl apply -f -
        kubectl apply -f infra/k8s/eso/secret-store.yaml
        kubectl apply -f infra/k8s/eso/external-secrets.yaml

    - name: Wait for ESO secret sync
      run: |
        kubectl wait --for=condition=Ready externalsecret/db-credentials \
          -n boardgames --timeout=120s
        kubectl wait --for=condition=Ready externalsecret/app-credentials \
          -n boardgames --timeout=120s

    - name: Apply Ingress
      run: kubectl apply -f infra/k8s/ingress.yaml

    - name: Apply Grafana manifests
      run: |
        kubectl apply -f infra/k8s/monitoring/namespace.yaml
        export GRAFANA_ROLE_ARN=$(terraform -chdir=infra/terraform/environments/dev output -raw grafana_irsa_role_arn)
        envsubst < infra/k8s/monitoring/grafana-serviceaccount.yaml | kubectl apply -f -
        kubectl apply -f infra/k8s/monitoring/grafana-configmap.yaml
        kubectl apply -f infra/k8s/monitoring/network-policy.yaml
        kubectl apply -f infra/k8s/monitoring/grafana-deployment.yaml
        kubectl apply -f infra/k8s/monitoring/grafana-service.yaml
        kubectl apply -f infra/k8s/monitoring/grafana-ingress.yaml

    - name: Verify
      run: |
        kubectl wait --for=condition=ready pod \
          -l app.kubernetes.io/name=aws-load-balancer-controller \
          -n kube-system \
          --timeout=120s
        kubectl get ingress -n boardgames

    - name: Print Grafana access
      run: |
        kubectl rollout status deployment/grafana -n monitoring --timeout=120s
        echo "Waiting for Grafana ingress address..."
        for i in $(seq 1 12); do
          ADDRESS=$(kubectl get ingress grafana -n monitoring \
            -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null)
          if [ -n "$ADDRESS" ]; then
            echo "Grafana URL: http://$ADDRESS/grafana"
            exit 0
          fi
          sleep 10
        done
        echo "Ingress address not yet available — check 'kubectl get ingress grafana -n monitoring'"
