name: Run App Unit Tests

on:
  push:
    branches:
    - "main"
    - "develop"

  pull_request:
    types: [ opened, edited, reopened, synchronize ]

jobs:
  run_unit_tests:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Setup Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.12"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-dev.txt

    - name: Run unit tests with coverage
      run: |
        pytest app/tests --cov=games --cov-report=term-missing --cov-config=.coveragerc -vvv
        # pytest app/tests --cov=boardgames --cov-report=term-missing --cov-config=.coveragerc -vvv
