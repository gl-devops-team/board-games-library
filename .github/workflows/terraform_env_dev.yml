name: Terraform Dev Environment

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Terraform action to perform"
        required: true
        default: "plan"
        type: choice
        options:
        - "plan"
        - "apply"
        - "destroy"
      confirm_destroy:
        description: "Confirm destruction of resources (only used when action is 'destroy')"
        required: false
        default: "false"
        type: boolean
      setup_cluster:
        description: "Run cluster setup after apply (installs LBC + ESO, one-time after cluster creation)"
        required: false
        default: "false"
        type: boolean

permissions:
  id-token: write
  contents: read

jobs:
  terraform-env-dev:
    runs-on: ubuntu-latest

    env:
      TF_VAR_db_user: ${{ secrets.TF_VAR_DB_USER }}
      TF_VAR_db_password: ${{ secrets.TF_VAR_DB_PASSWORD }}
      TF_VAR_db_name: ${{ secrets.TF_VAR_DB_NAME }}
      TF_VAR_app_secret_key: ${{ secrets.TF_VAR_APP_SECRET_KEY }}

    defaults:
      run:
        working-directory: infra/terraform/environments/dev

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v4
      with:
        terraform_version: 1.14.6

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v6
      with:
        role-to-assume: ${{ vars.AWS_PLATFORM_ROLE_ARN }}
        aws-region: eu-central-1

    - name: Terraform Format Check
      run: terraform fmt -check

    - name: Terraform Init
      run: terraform init

    - name: Terraform Validate
      run: terraform validate

    - name: Terraform Plan
      if: ${{ github.event.inputs.action != 'destroy' }}
      run: terraform plan -out=tfplan.binary

    - name: Terraform Apply
      if: ${{ github.event.inputs.action == 'apply' }}
      run: terraform apply -auto-approve tfplan.binary

    - name: Terraform Plan Destroy
      if: ${{ github.event.inputs.action == 'destroy' }}
      run: terraform plan -destroy

    - name: Cleanup Kubernetes resources before destroy
      if: ${{ github.event.inputs.action == 'destroy' && github.event.inputs.confirm_destroy == 'true' }}
      run: |
        if ! aws eks describe-cluster --name boardgames-dev-eks --region eu-central-1 &>/dev/null; then
          echo "EKS cluster not found, skipping Kubernetes cleanup"
          exit 0
        fi
        aws eks update-kubeconfig --region eu-central-1 --name boardgames-dev-eks
        echo "Deleting monitoring namespace (Grafana + Ingress)..."
        kubectl delete namespace monitoring --ignore-not-found --wait=false
        if kubectl get ingress boardgames -n boardgames &>/dev/null; then
          echo "Deleting boardgames ingress to remove ALB..."
          kubectl delete ingress boardgames -n boardgames --wait=false
        fi
        sleep 30
        if kubectl get pvc db-storage -n boardgames &>/dev/null; then
          echo "Deleting PVC to remove EBS volume..."
          kubectl delete pvc db-storage -n boardgames --wait=false
          sleep 30
        fi

    - name: Terraform Destroy
      if: ${{ github.event.inputs.action == 'destroy' && github.event.inputs.confirm_destroy == 'true' }}
      run: terraform destroy -auto-approve
