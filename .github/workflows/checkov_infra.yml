name: Infra Security Checks (Checkov)

on:
  pull_request:
    types: [ opened, edited, reopened, synchronize ]
  push:
    branches: [ main ]
    paths:
    - 'infra/terraform/**'
    - 'infra/docker/**'
    - 'infra/k8s/**'
  workflow_dispatch:


jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      infra: ${{ steps.filter.outputs.infra }}
    steps:
    - uses: actions/checkout@v6
    - uses: dorny/paths-filter@v3
      id: filter
      with:
        filters: |
          infra:
            - 'infra/terraform/**'
            - 'infra/docker/**'
            - 'infra/k8s/**'

  checkov-run:
    needs: changes
    if: needs.changes.outputs.infra == 'true'
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Install Checkov
      run: pip install checkov

    # 🔹 Terraform (full coverage)
    - name: Run Checkov on Terraform
      run: |
        checkov -d infra/terraform \
          --framework terraform \
          --compact \
          --quiet

    # 🔹 Dockerfiles (build security)
    - name: Run Checkov on Dockerfiles
      run: |
        checkov -d infra/docker \
          --framework dockerfile \
          --compact \
          --quiet

    # 🔹 Kubernetes manifests
    - name: Run Checkov on Kubernetes
      run: |
        checkov -d infra/k8s \
          --framework kubernetes \
          --compact \
          --quiet

  checkov-status:
    needs: checkov-run
    if: always()
    runs-on: ubuntu-latest
    steps:
    - name: Checkov result
      run: |
        if [[ "${{ needs.checkov-run.result }}" == "success" ]]; then
          echo "Checkov passed"
        elif [[ "${{ needs.checkov-run.result }}" == "skipped" ]]; then
          echo "Checkov skipped (no infra changes)"
        else
          exit 1
        fi
