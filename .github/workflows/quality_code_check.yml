name: Quality Code Checks (Python)

on:
  push:
    branches:
    - "main"

  pull_request:
    types: [ opened, edited, reopened, synchronize ]

jobs:
  quality_checks:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - uses: actions/setup-python@v6
      with:
        python-version: "3.12"
        cache: "pip"
        cache-dependency-path: |
          requirements.txt
          requirements-dev.txt

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-dev.txt

    - name: Verify lock files are up to date
      run: |
        pip-compile pyproject.toml -o requirements.txt --quiet --strip-extras
        pip-compile pyproject.toml --extra dev -o requirements-dev.txt --quiet --strip-extras
        git diff --exit-code

    - name: Run Linter
      run: ruff check . --output-format=github

    - name: Run Formatter Check
      run: ruff format . --check
