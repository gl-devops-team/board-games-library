# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
exclude: |
  (?x)(
    # ^app/src/manage.py |
    # ^app/src/boardgames/settings.py/.*$
  )

repos:
- repo: https://github.com/astral-sh/ruff-pre-commit
  # Ruff version.
  rev: v0.15.1
  hooks:
  # Run the linter.
  - id: ruff-check
    types_or: [ python, pyi ]
    args: [ "--output-format=grouped" ]
  # Run the formatter.
  - id: ruff-format
    types_or: [ python, pyi ]
    args: [ "--check" ]
