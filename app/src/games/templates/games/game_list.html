{% load static %}
<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Lista gier planszowych</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'games/styles.css' %}">
    <script src="{% static 'games/scripts.js' %}"></script>
</head>
<body>
    <div class="container">
        <h1>Lista gier planszowych</h1>

        <!-- Search input -->
        <input type="text" id="searchBox" placeholder="Szukaj gry po nazwie...">

        <table id="gamesTable">
            <thead>
                <tr>
                    <th>
                        Nazwa 
                        <span class="arrows">
                            <span class="arrow up">▲</span>
                            <span class="arrow down">▼</span>
                        </span>
                    </th>
                    <th>
                        Liczba graczy
                        <span class="arrows">
                            <span class="arrow up">▲</span>
                            <span class="arrow down">▼</span>
                        </span>
                    </th>
                    <th>
                        Czas gry
                        <span class="arrows">
                            <span class="arrow up">▲</span>
                            <span class="arrow down">▼</span>
                        </span>
                    </th>
                    <th>
                        Kategoria
                        <span class="arrows">
                            <span class="arrow up">▲</span>
                            <span class="arrow down">▼</span>
                        </span>
                    </th>
                </tr>
            </thead>
            <tbody>
                {% for game in games %}
                <tr class="game-row" data-image="{{ game.image_url }}">
                    <td>{{ game.name }}</td>
                    <td>{{ game.players }}</td>
                    <td>{{ game.time }}</td>
                    <td>{{ game.description }}</td>
                </tr>
                {% empty %}
                <tr>
                    <td colspan="4" class="no-data">Brak gier do wyświetlenia</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>

    <!-- Link to external JavaScript -->
    <script src="{% static 'games/scripts.js' %}"></script>
</body>
</html>
